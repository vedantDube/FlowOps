name: Prisma migration drift check

on:
  pull_request:
    paths:
      - "flowops-api/prisma/**"
  push:
    branches: [main]
    paths:
      - "flowops-api/prisma/**"

jobs:
  check-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowops_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: flowops-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowops-api/package-lock.json

      - run: npm ci

      # Fails if schema.prisma has changes not captured by a committed
      # migration — the class of bug that left prisma/migrations empty
      # relative to the schema for months (see commit 5e85998's postmortem).
      - name: Check schema.prisma matches migration history
        env:
          # prisma.config.ts requires DATABASE_URL to load at all, even though
          # migrate diff only touches the shadow database below.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowops_shadow
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowops_shadow
        run: |
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code
