name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint & Type-check Frontend ─────────────────────────────────────────────
  lint-web:
    name: Lint & Build (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowops-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: flowops-web/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  # ── Lint & Validate Backend ────────────────────────────────────────────────
  lint-api:
    name: Lint & Validate (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowops-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: flowops-api/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate

  # ── Docker Build Test ──────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-web, lint-api]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t flowops-api:test .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t flowops-web:test .

  # ── Prisma Migration Check ────────────────────────────────────────────────
  prisma-check:
    name: Prisma Schema Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowops-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: flowops-api/package-lock.json

      - run: npm ci
      - run: npx prisma validate
      - name: Check for pending migrations
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code || echo "⚠️  Schema has changes not yet in a migration"
