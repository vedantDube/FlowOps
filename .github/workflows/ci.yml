name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowops-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowops-api/package-lock.json

      - run: npm ci

      - name: Syntax-check all source files
        run: |
          for f in $(find src -name '*.js'); do node --check "$f"; done

      - name: Run unit tests
        run: npm test

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowops-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flowops-web/package-lock.json

      - run: npm ci

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
